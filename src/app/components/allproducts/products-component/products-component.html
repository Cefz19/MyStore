<button (click)="createNewProduct()">Create</button>
<div class="products--grid">
  @for (product of products(); track product.id) {
  <div>
    <p>{{ product.title }}</p>
    <app-product-component [product]="product" (addedProduct)="onAddToShoppingCart($event)"
      (showProduct)="onShowDetail($event)" />
  </div>
  }
</div>

<div class="product-detail" [class.active]=" showProductDetail">
  @if(productChosen) {
  <div>
    <button class="close-btn" (click)="toggleProductDetail()">Close</button>
    
    <swiper-container 
    [slidesPerView]="1"
    navigation="true" 
    pagination="true" 
    scrollbar="true"
    >
      @for (img of productChosen.images; track img) {
      <swiper-slide>
        <img [src]="img" [alt]="productChosen.title">
      </swiper-slide>
      }
    </swiper-container>

    <div class="detail-content">
      <h1>{{ productChosen.title }}</h1>
      <p>{{ productChosen.description }}</p>
    </div>
    
  </div>
  }
</div>
