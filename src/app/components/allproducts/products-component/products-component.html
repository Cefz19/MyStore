<p>The amount {{ myShoppingCart.length }}</p>
<p>Total: ${{ total }}</p>
<p>
  Today: {{ today  | date: 'short' }}
</p>
<p>
  TodayAgo: {{ today | timeAgoPipe }}
</p>
<p>
  Ahother date: {{ date | date: 'yyyy...dd...MM'}}
</p>
<p>
  {{ 'hOLA Bascaro CCAS ' | uppercase}}
</p>

<div class="products--grid">
  @for (product of products(); track product.id) {
    <div>
        <p>{{ product.title }}</p>
      <app-product-component 
      [product]="product" 
      (addedProduct)="onAddToShoppingCart($event)" 
      />
    </div>
  }
</div>
