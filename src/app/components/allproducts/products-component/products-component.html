<p>
    The amount {{ myShoppingCart.length }}
</p>
<p>
    Total: ${{ total }}
</p>
<h1>All Products</h1>
<div class="products__grid">
    @for(product of products; track product.id) {
    <app-product-component
    [product]="product" 
    (addedProduct)="onAddToShoppingCart($event)"
    />
    }
</div>
