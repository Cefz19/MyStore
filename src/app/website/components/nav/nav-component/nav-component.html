<div class="show-mobile">
  <div>
    <button (click)="toggleMenu()">
      <img src="assets/svg/icon_menu.svg" alt="menu">
    </button>
    <a href="">
      <img src="assets/svg/logo_yard_sale.svg" alt="logo">
    </a>
    <a href="">
      <img src="assets/svg/icon_shopping_cart.svg" alt="icon">
    </a>
  </div>

  <!--  [ngClass]="{'active' : activeMenu}" -->
  <div class="side-menu" [class.active]="activeMenu()">
    <button (click)="toggleMenu()">Close</button>
    <ul>
      <ul>
        <li><a routerLink="home">All</a></li>
        @for (item of filteredCategories(); track  item.id) {
        <li><a [routerLink]="['/category', item.id]">{{ item.name }}</a></li>
      }
      </ul>
      
    </ul>
  </div>

</div>


<div class="hide-mobile">
  <div>
    <nav>
      <a href="" class="logo">
        <img src="assets/svg/logo_yard_sale.svg" alt="logo">
      </a>
      <ul>
        <li><a routerLink="home" routerLinkActive="active"  [routerLinkActiveOptions]="{exact: true}">All</a></li>
      @for (item of filteredCategories(); track  item.id) {
        <li><a routerLinkActive="active" [routerLink]="['/category', item.id]">{{ item.name }}</a></li>
      }
      </ul>
    </nav>
    <div class="info">

      <div class="account">
        @if (!profile()){
        <button (click)="login()">Login</button>
        } @else {
        <a routerLink="/profile">{{ profile()?.email }}</a>
        }
      </div>
      <div>
        <a href="">
          <img src="assets/svg/icon_shopping_cart.svg" alt="logo">
        </a>
        <span class="counter">{{ counter}}</span>
      </div>
    </div>
  </div>
</div>
